version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       shopdb
      POSTGRES_USER:     shopuser
      POSTGRES_PASSWORD: shoppass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser -d shopdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./app/backend
      target:  runtime
    restart: unless-stopped
    environment:
      NODE_ENV:    development
      PORT:        "3000"
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_NAME:     shopdb
      DB_USER:     shopuser
      DB_PASSWORD: shoppass
      CORS_ORIGIN: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app/backend/src:/app/src:ro   # hot reload in dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── DB Seeder (runs once) ──────────────────────────────────────────────────
  db-seeder:
    build:
      context: ./app/backend
      target:  runtime
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_NAME:     shopdb
      DB_USER:     shopuser
      DB_PASSWORD: shoppass
    command: ["node", "src/db/seed.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Frontend (served via nginx) ────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./app/frontend:/usr/share/nginx/html:ro
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
