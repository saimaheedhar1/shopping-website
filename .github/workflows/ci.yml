name: CI – Test & Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: Lint & Test ──────────────────────────────────────────────────
  backend-test:
    name: Backend – Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: app/backend/coverage/

  # ── Backend: Docker Build ──────────────────────────────────────────────────
  backend-docker:
    name: Backend – Docker Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          push: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: shop-demo/backend:ci

  # ── Frontend: Validate ─────────────────────────────────────────────────────
  frontend-validate:
    name: Frontend – HTML Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          npm install -g html-validate
          html-validate "app/frontend/**/*.html"

  # ── Terraform: Validate & Plan ────────────────────────────────────────────
  terraform-validate:
    name: Terraform – Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format
        working-directory: terraform
        run: terraform fmt -recursive

      - name: Terraform Init (local backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
