<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopDemo – Modern Online Store</title>
  <meta name="description" content="Discover amazing products at unbeatable prices.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <!-- Inject API URL at deploy time; fallback to /api for local dev -->
  <script>window.ENV_API_URL = '${CLOUDFRONT_API_URL}/api';</script>
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        ShopDemo
      </a>

      <nav class="navbar-links">
        <a href="/" class="active">Shop</a>
        <a href="#about">About</a>
      </nav>

      <button class="cart-btn" onclick="openCart()" aria-label="Open cart">
        🛒
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
    </div>
  </nav>

  <!-- ── Hero ────────────────────────────────────────────────────────────── -->
  <section class="hero">
    <div class="container">
      <h1>Find Your Next Favourite</h1>
      <p>Thousands of premium products, delivered to your door.</p>
      <form class="hero-search" id="search-form">
        <input type="text" id="search-input" placeholder="Search products…" autocomplete="off">
        <button type="submit">Search</button>
      </form>
    </div>
  </section>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="container">
    <!-- Filters -->
    <div class="filters" id="category-filters">
      <span class="filter-label">Category:</span>
      <button class="filter-btn" data-cat="All" onclick="filterByCategory('All')">All</button>
    </div>

    <!-- Products -->
    <section class="products-section">
      <div class="section-header">
        <h2>Products</h2>
        <span class="product-count" id="product-count"></span>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </section>
  </main>

  <!-- ── Footer ──────────────────────────────────────────────────────────── -->
  <footer id="about">
    <p>© 2024 ShopDemo &mdash; Built with ♥ on AWS &bull; Terraform + ECS + CloudFront</p>
  </footer>

  <!-- ── Cart Sidebar ────────────────────────────────────────────────────── -->
  <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
  <aside class="cart-sidebar" id="cart-sidebar" role="dialog" aria-label="Shopping cart">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="cart-close" onclick="closeCart()" aria-label="Close cart">×</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span id="cart-total">$0.00</span>
      </div>
      <button class="btn-checkout" onclick="openCheckout()">Checkout →</button>
    </div>
  </aside>

  <!-- ── Product Detail Modal ────────────────────────────────────────────── -->
  <div class="modal-overlay" id="product-modal" onclick="if(event.target===this) closeModal('product-modal')">
    <div class="modal">
      <div class="modal-header">
        <div>
          <small id="modal-category" style="color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:.05em"></small>
          <h2 id="modal-name"></h2>
        </div>
        <button class="modal-close" onclick="closeModal('product-modal')" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <img id="modal-img" class="modal-product-img" src="" alt="">
        <div class="modal-price" id="modal-price"></div>
        <p class="modal-desc" id="modal-desc"></p>
        <div class="modal-actions">
          <button class="btn-primary" id="modal-add-btn">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Checkout Modal ──────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="checkout-modal" onclick="if(event.target===this) closeModal('checkout-modal')">
    <div class="modal">
      <div class="modal-header">
        <h2>Checkout</h2>
        <button class="modal-close" onclick="closeModal('checkout-modal')">×</button>
      </div>
      <div class="modal-body">

        <!-- Form -->
        <div id="checkout-form-body">
          <div class="checkout-summary" id="checkout-summary"></div>

          <div class="form-group">
            <label for="checkout-name">Full Name</label>
            <input id="checkout-name" type="text" placeholder="Jane Doe" required>
          </div>
          <div class="form-group">
            <label for="checkout-email">Email Address</label>
            <input id="checkout-email" type="email" placeholder="jane@example.com" required>
          </div>
          <div class="form-group">
            <label for="checkout-address">Shipping Address</label>
            <input id="checkout-address" type="text" placeholder="123 Main St, City, Country" required>
          </div>
          <button class="btn-primary" onclick="submitOrder()" style="margin-top:.5rem">
            Place Order →
          </button>
        </div>

        <!-- Success -->
        <div id="checkout-success" style="display:none" class="success-screen">
          <div class="success-icon">🎉</div>
          <h2>Order Placed!</h2>
          <p>Thank you! Your order has been received.</p>
          <p>Order ID: <span class="order-id" id="order-id"></span></p>
          <button class="btn-primary" style="margin-top:1rem" onclick="closeModal('checkout-modal'); document.getElementById('checkout-form-body').style.display='block'; document.getElementById('checkout-success').style.display='none'">
            Continue Shopping
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Toast Container ─────────────────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <script src="js/app.js"></script>
</body>
</html>
